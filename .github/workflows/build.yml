name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Quality gates + JVM tests. macOS runners ship the Android SDK, so apiCheck
  # (which compiles the JVM, Android and native/Wasm klib ABIs) runs here too.
  quality:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Formatting (spotlessCheck)
        run: ./gradlew spotlessCheck

      - name: Static analysis (detekt)
        run: ./gradlew detekt

      - name: Binary compatibility (apiCheck)
        run: ./gradlew apiCheck

      - name: JVM tests
        run: ./gradlew jvmTest

      - name: Coverage gate (koverVerify)
        run: ./gradlew koverVerify

  # Compile every declared target family so a platform-specific break is caught.
  multiplatform:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Compile all targets
        run: |
          ./gradlew \
            :cloudflare-client:compileKotlinJvm \
            :cloudflare-d1:compileKotlinJvm \
            :cloudflare-kv:compileKotlinJvm \
            :cloudflare-r2:compileKotlinJvm \
            :cloudflare-realtime:compileKotlinJvm \
            :worker-template:jsProductionExecutableCompileSync
